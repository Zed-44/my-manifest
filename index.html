    <style>
        body { font-family: Georgia, serif; background: #0a1a0f; color: #e8e5dc; text-align: center; padding: 2rem; }
        h1 { color: #d4af37; }
        select, button, input { padding: 0.5rem; margin: 0.3rem; border-radius: 0.5rem; }
        button { background: #d4af37; color: #0a1a0f; border: none; cursor: pointer; font-weight: bold; }
        .ad-slot { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); padding: 10px; margin: 10px; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>
    <h1>My Manifest</h1>
    <p>Manifest Your Day</p>
    <p id="todayDate"></p>
    
    <div class="ad-slot" id="adSlot1">Ad Slot 1</div>
    
    <select id="m1"><option value="">Month</option></select>
    <select id="d1"><option value="">Day</option></select>
    <button id="btn1">Manifest</button>
    <div id="out1"></div>
    
    <div class="ad-slot" id="adSlot2">Ad Slot 2</div>

    <script>
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString();
    
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var m1 = document.getElementById('m1');
    var d1 = document.getElementById('d1');
    
    months.forEach(function(name, i) {
        var opt = document.createElement('option');
        opt.value = i + 1;
        opt.textContent = name;
        m1.appendChild(opt);
    });
    
    m1.onchange = function() {
        d1.innerHTML = '<option value="">Day</option>';
        var month = parseInt(this.value);
        if (!month) return;
        var days = new Date(2024, month, 0).getDate();
        for (var d = 1; d <= days; d++) {
            var opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            d1.appendChild(opt);
        }
    };
    
    document.getElementById('btn1').onclick = function() {
        var m = parseInt(m1.value), d = parseInt(d1.value);
        if (!m || !d) { alert('Please select month and day.'); return; }
        var code = ((m * 7 + d * 13) % 31) + 1;
        document.getElementById('out1').innerHTML = '<h2>Your Manifest Code: ' + code + '</h2><p>Fortune: A golden opportunity whispers your name today.</p>';
    };

    // Ad Slot 1 - Adsterra 320x50
    var ad1 = document.getElementById('adSlot1');
    ad1.innerHTML = '';
    var s1 = document.createElement('script');
    s1.text = "atOptions = { key: '12e069811ed7ffd8ff7d69bea2f7effd', format: 'iframe', height: 50, width: 320, params: {} };";
    ad1.appendChild(s1);
    var s2 = document.createElement('script');
    s2.src = 'https://www.highperformanceformat.com/12e069811ed7ffd8ff7d69bea2f7effd/invoke.js';
    ad1.appendChild(s2);

    // Ad Slot 2 - Smartlink
    document.getElementById('adSlot2').innerHTML = '<a href="https://www.effectivecpmnetwork.com/napnvfb64?key=a0eebf0f133fc905b0bc755bcf2a3003" target="_blank" style="color:#d4af37;">Sponsored</a>';

    console.log('Site loaded successfully!');
    </script>
</body>
</html>
