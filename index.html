        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; background: var(--bg); background-image: radial-gradient(ellipse at 30% 10%, rgba(212,175,55,0.06) 0%, transparent 55%); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; text-align: center; }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); opacity: 0.7; margin: 0.5rem 0 0.3rem; }

    <script>

        function cc(m,d){ return ((m*7+d*13)%31)+1; }
        function gp(p,s,o){ o=o||0; return p[Math.abs(s+o)%p.length]; }
        function sc(n,v,d){ var dt=new Date(); dt.setTime(dt.getTime()+(d*86400000)); document.cookie=n+"="+encodeURIComponent(JSON.stringify(v))+";expires="+dt.toUTCString()+";path=/;SameSite=Lax"; }
        function gc(n){ var cn=n+"="; var ca=document.cookie.split(';'); for(var i=0;i<ca.length;i++){ var c=ca[i].trim(); if(c.indexOf(cn)===0){ try{return JSON.parse(c.substring(cn.length));}catch(e){return null;} } } return null; }
        function br(m,d,td){ var code=cc(m,d); var dy=td?doy(new Date(td)):doy(new Date()); var s=dy+code; return {code:code,fortune:gp(fortunes,s,0),luckyColor:gp(luckyColors,s,3),luckyNumber:gp(luckyNumbers,s,7),powerWord:gp(powerWords,s,11),moneyAdvice:gp(moneyAdvice,s,13),loveEnergy:gp(loveEnergies,s,17),avoid:gp(avoidToday,s,19),mood:gp(moodEnergies,s,23),targetDate:td}; }

        function renderOutput(r, isFuture, isPast) {
